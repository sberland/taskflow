name: Neon — branche DB éphémère par PR

on:
  pull_request:
    types:
      - opened
      - reopened
      - synchronize
      - closed
    paths-ignore:
      - "docs/**"
      - "todo/**"
      - "**.md"

concurrency:
  group: pr-${{ github.event.number }}

jobs:
  create-branch:
    if: github.event.action != 'closed'
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - uses: actions/checkout@v4

      - name: Create Neon branch from main
        id: create-branch
        uses: neondatabase/create-branch-action@v5
        with:
          project_id: ${{ secrets.NEON_PROJECT_ID }}
          parent: main
          branch_name: preview/pr-${{ github.event.number }}
          username: neondb_owner
          api_key: ${{ secrets.NEON_API_KEY }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Apply Prisma migrations on PR branch
        run: npx prisma migrate deploy
        env:
          DATABASE_URL: ${{ steps.create-branch.outputs.db_url_pooled }}

      - name: Comment on PR with DB info
        uses: actions/github-script@v7
        with:
          script: |
            const body = `### 🗄️ Branche Neon créée pour cette PR

            Une branche DB éphémère \`preview/pr-${{ github.event.number }}\` a été créée depuis \`main\` avec les migrations Prisma appliquées.

            Elle sera automatiquement supprimée à la fermeture de la PR.`;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body
            });

  delete-branch:
    if: github.event.action == 'closed'
    runs-on: ubuntu-latest
    steps:
      - name: Delete Neon branch
        uses: neondatabase/delete-branch-action@v3
        with:
          project_id: ${{ secrets.NEON_PROJECT_ID }}
          branch: preview/pr-${{ github.event.number }}
          api_key: ${{ secrets.NEON_API_KEY }}
