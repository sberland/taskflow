name: QA DB — reset from prod + migrate

on:
  push:
    branches: [qa]

jobs:
  reset-and-migrate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install neonctl
        run: npm install -g neonctl@latest

      - name: Reset Neon qa branch from main (prod data)
        run: neonctl branches reset qa --parent --project-id ${{ secrets.NEON_PROJECT_ID }}
        env:
          NEON_API_KEY: ${{ secrets.NEON_API_KEY }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Apply migrations
        run: npx prisma migrate deploy
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL_QA }}
