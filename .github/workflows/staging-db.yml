name: Staging DB — reset from prod + migrate

on:
  push:
    branches: [staging]

jobs:
  reset-and-migrate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Reset Neon staging branch from main (prod data)
        run: |
          curl -s -X POST \
            "https://console.neon.tech/api/v2/projects/${{ secrets.NEON_PROJECT_ID }}/branches/${{ secrets.NEON_STAGING_BRANCH_ID }}/restore" \
            -H "Authorization: Bearer ${{ secrets.NEON_API_KEY }}" \
            -H "Content-Type: application/json" \
            -d '{"source_branch_id": "${{ secrets.NEON_MAIN_BRANCH_ID }}"}' \
            | jq -r 'if .branch then "Reset OK: \(.branch.name)" else "Error: \(.message)" end'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Apply migrations
        run: npx prisma migrate deploy
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL_STAGING }}
